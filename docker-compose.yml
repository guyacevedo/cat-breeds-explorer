services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/cat-breeds
      CAT_API_URL: ${CAT_API_URL:-https://api.thecatapi.com/v1}
      CAT_API_KEY: ${CAT_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_local_env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"

volumes:
  mongo-data:
